<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="40" x2="1120" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7F7"/>
      <stop offset="1" stop-color="#F3F4F6"/>
    </linearGradient>
    <linearGradient id="card" x1="180" y1="120" x2="1100" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
